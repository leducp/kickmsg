name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build (${{ matrix.os }}${{ matrix.label && format(' - {0}', matrix.label) || '' }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux x86_64: full test suite
          - os: ubuntu-latest
            label: tests
            configure_args: "--with=unit_tests --with=examples"

          # Linux x86_64: TSAN
          - os: ubuntu-latest
            label: tsan
            configure_args: "--with=unit_tests --with=tsan"

          # Linux x86_64: benchmarks
          - os: ubuntu-latest
            label: benchmarks
            configure_args: "--with=benchmarks"

          # Windows
          - os: windows-latest
            label: windows

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-conan

      - name: Configure and build (Linux)
        if: runner.os == 'Linux'
        run: |
          scripts/configure.sh build ${{ matrix.configure_args }}
          scripts/setup_build.sh build --build-type ${{ env.BUILD_TYPE }}
          cd build && make -j
        shell: bash

      - name: Configure and build (Windows)
        if: runner.os == 'Windows'
        run: |
          conan install conanfile.py -of=build/ \
            -pr:b conan/profile_windows_x86_64.txt \
            -pr:h conan/profile_windows_x86_64.txt \
            -o "&:unit_tests=True" \
            --build=missing -s build_type=${{ env.BUILD_TYPE }}
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_UNIT_TESTS=ON \
            -G "MinGW Makefiles"
          cmake --build build --config ${{ env.BUILD_TYPE }}
        shell: bash

      - name: Unit tests
        if: contains(matrix.configure_args, 'unit_tests') || runner.os == 'Windows'
        working-directory: build
        run: ctest . --output-on-failure
        shell: bash

      - name: Run benchmarks
        if: contains(matrix.configure_args, 'benchmarks')
        working-directory: build
        run: ./kickmsg_microbench --benchmark_min_time=0.1s
        shell: bash

  # Cross-compile for ARM64 (no run — just verify it compiles)
  cross_arm64:
    name: Cross-compile (linux-aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-conan

      - name: Install cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Configure and build
        run: |
          scripts/configure.sh build_arm --with=unit_tests
          scripts/setup_build.sh build_arm --target linux-aarch64 --build-type ${{ env.BUILD_TYPE }}
          cd build_arm && make -j
        shell: bash

      - name: Verify ARM binaries
        run: file build_arm/kickmsg_unit build_arm/kickmsg_stress_test | grep "ARM aarch64"
        shell: bash

  # Build Python wheels across the supported platforms.  Runs on every
  # push so wheel-build regressions surface immediately; only the tagged
  # release job below actually uploads to PyPI.
  build-wheels:
    name: Build Python Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-14]
    env:
      # `native`: the runner's own architecture.  Linux x86_64 runner →
      # manylinux_x86_64 wheels; Linux ARM runner → manylinux_aarch64;
      # macOS 14 runner (Apple Silicon) → universal2 via the macOS cibw
      # config in pyproject.toml.
      CIBW_ARCHS: native
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # so tools/setup/version.sh can read tags

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1.0
        with:
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheelhouse-kickmsg-${{ matrix.os }}
          path: wheelhouse/*.whl

  # Publish to PyPI on tag push.  Uses OIDC trusted publishing (configured
  # per-repo at https://pypi.org/manage/account/publishing/ — the `kickmsg`
  # PyPI project must list this repository + environment `maintainer` as
  # a trusted publisher).  No API tokens stored in GitHub secrets.
  release:
    needs: [build, cross_arm64, build-wheels]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    environment:
      name: maintainer
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheelhouse-kickmsg-*
          path: wheelhouse
          merge-multiple: true

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
        run: |
          gh release create "$tag" wheelhouse/*.whl \
              --repo="$GITHUB_REPOSITORY" \
              --title="${GITHUB_REPOSITORY#*/} ${tag#v}" \
              --generate-notes

      - name: Publish wheels to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          packages-dir: wheelhouse
          verify-metadata: true
          attestations: true
          print-hash: true
          skip-existing: true
